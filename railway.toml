# Konfigurasi deploy Railway — Sistem Presensi Guru
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"
# composer install dijalankan Nixpacks (PHP + ext-gd dari composer.json)

[deploy]
# Urutan: siapkan storage → clear cache Laravel → jalankan server (via railway-start.sh)
startCommand = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs bootstrap/cache && php artisan view:clear && php artisan cache:clear && php artisan config:clear && php artisan optimize && bash scripts/railway-start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
